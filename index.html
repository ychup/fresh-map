<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>
                <img src="OIP.png" alt="Logo" style="height: 1.8rem; width: auto;" onerror="this.style.display='none'">

            <p data-i18n="subtitle">周边果蔬 · 价比三家</p>

        <div class="right-controls">

            <div class="lang-switcher">

    <div id="shopContainer" class="shop-grid">
        <div class="empty-state" data-i18n="loading">📍 正在加载店铺数据，或点击“定位我”查看周边距离</div>

        <i class="fas fa-chart-line"></i> <span data-i18n="footer_text">价格参考周边实时行情 | 颜色标识: ●偏低 ●中等 ●偏高 | 🏆 表示该商品在附近最低价</span>
    </div>
</div>

<div id="rewardModal" class="modal-overlay">
    <div class="modal-content">

        en: { app_name: "FreshMap", subtitle: "Nearby Produce · Price Compare", location_not: "Not located", locate_me: "Locate me", tab_all: "🍎 All Stores", tab_fruit: "🍓 Fruit Focus", tab_veg: "🥬 Veg Focus", sort_label: "Sort by", sort_distance: "📍 Distance (Nearest)", sort_fruit_asc: "🍎 Fruit Avg Price Low→High", sort_fruit_desc: "🍎 Fruit Avg Price High→Low", sort_veg_asc: "🥬 Veg Avg Price Low→High", sort_veg_desc: "🥬 Veg Avg Price High→Low", loading: "📍 Loading store data...", footer_text: "Reference local prices | Color indicator: ●Low ●Medium ●High", fruit_title: "Fruit Prices", veg_title: "Vegetable Prices", no_fruit: "No fruit", no_veg: "No vegetables", avg_fruit: "Fruit avg", avg_veg: "Veg avg", no_fruit_data: "No fruit", no_veg_data: "No veg", distance_km: "km", empty_shop: "No stores found.", reward_btn: "Reward", search_placeholder: "Search...", hot_tags: "🔥 Hot Items:", filter_active: "Filter by: ", clear_filter: "Clear", sort_price_low: "💰 Price Low to High" },
        ko: { app_name: "신선지도", subtitle: "주변 채소과일 · 가격 비교", location_not: "위치 미설정", locate_me: "내 위치", tab_all: "🍎 전체 매장", tab_fruit: "🍓 과일 중심", tab_veg: "🥬 채소 중심", sort_label: "정렬 기준", sort_distance: "📍 거리 가까운 순", sort_fruit_asc: "🍎 과일 평균가 낮은순", sort_fruit_desc: "🍎 과일 평균가 높은순", sort_veg_asc: "🥬 채소 평균가 낮은순", sort_veg_desc: "🥬 채소 평균가 높은순", loading: "📍 매장 데이터 로딩 중...", footer_text: "주변 실시간 가격 참고 | 색상 표시: ●낮음 ●보통 ●높음", fruit_title: "과일 가격", veg_title: "채소 가격", no_fruit: "과일 없음", no_veg: "채소 없음", avg_fruit: "과일 평균", avg_veg: "채소 평균", no_fruit_data: "과일 없음", no_veg_data: "채소 없음", distance_km: "km", empty_shop: "조건에 맞는 매장이 없습니다.", reward_btn: "후원", search_placeholder: "검색...", hot_tags: "🔥 인기 상품:", filter_active: "필터: ", clear_filter: "지우기", sort_price_low: "💰 가격 낮은순" }
    };

    let currentLang = "zh";
    let currentProductFilter = "";
    let currentTypeFilter = "all";
    let currentSort = "distance";

    function getAllUniqueProducts() {
        const products = new Set();
        STORES_BASE.forEach(shop => {
            shop.fruits.forEach(f => products.add(f.name));
            shop.vegetables.forEach(v => products.add(v.name));
        });
        return Array.from(products).sort();
    }

    const STORES_BASE = [
        { id:1, type:"fruit", lat:31.2304, lng:121.4737, fruits:[{ name:"苹果", price:6.8, unit:"斤"},{ name:"香蕉", price:4.5, unit:"斤"},{ name:"草莓", price:18.0, unit:"斤"}], vegetables:[{ name:"西红柿", price:4.2, unit:"斤"},{ name:"黄瓜", price:3.5, unit:"斤"}] },
        { id:2, type:"all", lat:31.2350, lng:121.4680, fruits:[{ name:"苹果", price:5.2, unit:"斤"},{ name:"香蕉", price:3.8, unit:"斤"},{ name:"橙子", price:6.5, unit:"斤"}], vegetables:[{ name:"西红柿", price:3.2, unit:"斤"},{ name:"黄瓜", price:2.8, unit:"斤"},{ name:"西兰花", price:5.5, unit:"斤"}] },
        { id:3, type:"vegetable", lat:31.2422, lng:121.4805, fruits:[{ name:"苹果", price:8.9, unit:"斤"},{ name:"蓝莓", price:28.0, unit:"盒"}], vegetables:[{ name:"西红柿", price:6.5, unit:"斤"},{ name:"黄瓜", price:5.2, unit:"斤"},{ name:"菠菜", price:7.0, unit:"斤"},{ name:"生菜", price:4.8, unit:"斤"}] },
        { id:4, type:"fruit", lat:31.2256, lng:121.4601, fruits:[{ name:"苹果", price:7.5, unit:"斤"},{ name:"香蕉", price:5.0, unit:"斤"},{ name:"车厘子", price:45.0, unit:"斤"},{ name:"芒果", price:12.0, unit:"斤"}], vegetables:[{ name:"西红柿", price:4.9, unit:"斤"}] },
        { id:5, type:"vegetable", lat:31.2485, lng:121.4853, fruits:[{ name:"苹果", price:5.5, unit:"斤"}], vegetables:[{ name:"西红柿", price:2.9, unit:"斤"},{ name:"黄瓜", price:2.5, unit:"斤"},{ name:"土豆", price:1.8, unit:"斤"},{ name:"大白菜", price:1.2, unit:"斤"},{ name:"菠菜", price:3.2, unit:"斤"}] },
        { id:6, type:"fruit", lat:31.2380, lng:121.4788, fruits:[{ name:"苹果", price:6.0, unit:"斤"},{ name:"香蕉", price:4.0, unit:"斤"},{ name:"葡萄", price:9.9, unit:"斤"},{ name:"西瓜", price:2.5, unit:"斤"}], vegetables:[{ name:"黄瓜", price:3.6, unit:"斤"}] }
    ];

    function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = deg2rad(lat2 - lat1);
        const dLon = deg2rad(lon2 - lon1);
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    function deg2rad(deg) { return deg * (Math.PI/180); }

    let currentLocation = { lat: 31.2304, lng: 121.4737 };

    function getAvgFruitPrice(shop) { if(!shop.fruits.length) return Infinity; return shop.fruits.reduce((acc,f)=>acc+f.price,0)/shop.fruits.length; }
    function getAvgVegPrice(shop) { if(!shop.vegetables.length) return Infinity; return shop.vegetables.reduce((acc,v)=>acc+v.price,0)/shop.vegetables.length; }

    function filterShopsByProduct(shops, productName) {
        if (!productName) return shops;
        return shops.filter(shop => {
            const hasFruit = shop.fruits.some(f => f.name === productName);
            const hasVeg = shop.vegetables.some(v => v.name === productName);
            return hasFruit || hasVeg;
        });
    }

    // 计算每个商品在所有店铺中的最低价 (用于🏆标记)
    function computeGlobalMinPrices(shops) {
        const minMap = new Map(); // key: 商品名, value: 最低价(CNY)
        shops.forEach(shop => {
            [...shop.fruits, ...shop.vegetables].forEach(item => {
                const currentMin = minMap.get(item.name);
                if (currentMin === undefined || item.price < currentMin) {
                    minMap.set(item.name, item.price);
                }
            });
        });
        return minMap;
    }

    function getFinalSortedShops(shops, baseSort, productFilter) {
        let filtered = [...shops];
        if (productFilter) {
            const shopsWithPrice = filtered.map(shop => {
                let minPrice = Infinity;
                const fruitMatch = shop.fruits.find(f => f.name === productFilter);
                if (fruitMatch) minPrice = Math.min(minPrice, fruitMatch.price);
                const vegMatch = shop.vegetables.find(v => v.name === productFilter);
                if (vegMatch) minPrice = Math.min(minPrice, vegMatch.price);
                return { ...shop, _filterPrice: minPrice };
            });
            return shopsWithPrice.sort((a,b) => {
                if (a._filterPrice === Infinity && b._filterPrice === Infinity) return 0;
                if (a._filterPrice === Infinity) return 1;
                if (b._filterPrice === Infinity) return -1;
                return a._filterPrice - b._filterPrice;
            });
        } else {
            switch(baseSort) {
                case "distance": return filtered.sort((a,b)=>a.distance-b.distance);
                case "price_asc_fruit": return filtered.sort((a,b)=>getAvgFruitPrice(a)-getAvgFruitPrice(b));
                case "price_desc_fruit": return filtered.sort((a,b)=>getAvgFruitPrice(b)-getAvgFruitPrice(a));
                case "price_asc_veg": return filtered.sort((a,b)=>getAvgVegPrice(a)-getAvgVegPrice(b));
                case "price_desc_veg": return filtered.sort((a,b)=>getAvgVegPrice(b)-getAvgVegPrice(a));
                default: return filtered;
            }
        }
    }

    function updateShopsWithDistanceAndLang() {
        return STORES_BASE.map(shop => ({ ...shop, distance: getDistanceFromLatLon(currentLocation.lat, currentLocation.lng, shop.lat, shop.lng), displayName: storeNames[shop.id]?.[currentLang] || shop.name }));
    }

    function getPriceLevel(price, allPricesArray) {
        if(!allPricesArray.length) return "medium";
        const avg = allPricesArray.reduce((a,b)=>a+b,0)/allPricesArray.length;
        const stdDev = Math.sqrt(allPricesArray.map(x=>Math.pow(x-avg,2)).reduce((a,b)=>a+b,0)/allPricesArray.length);
        if(price > avg + (stdDev*0.5)) return "high";
        if(price < avg - (stdDev*0.5)) return "low";
        return "medium";
    }

    function render(shops) {
        const container = document.getElementById('shopContainer');
        if(!shops.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-store-slash"></i> ${translations[currentLang].empty_shop}</div>`; return; }
        
        let allFruitPrices = [], allVegPrices = [];
        shops.forEach(shop => { shop.fruits.forEach(f => allFruitPrices.push(f.price)); shop.vegetables.forEach(v => allVegPrices.push(v.price)); });
        
        // 计算全局最低价 (基于当前显示的店铺集合，保证🏆只出现在可见范围内)
        const globalMinMap = computeGlobalMinPrices(shops);
        
        const currency = currencySymbols[currentLang];
        const unitMap = unitMapping[currentLang];
        
        const cardsHtml = shops.map(shop => {
            // 水果列表
            const fruitItemsHtml = shop.fruits.map(fruit => {
                const level = getPriceLevel(fruit.price, allFruitPrices);
                let levelClass = "", iconHtml = "";
                if(level === "high") { levelClass = "high-price"; iconHtml = '<i class="fas fa-arrow-up trend-icon"></i>'; }
                else if(level === "low") { levelClass = "low-price"; iconHtml = '<i class="fas fa-arrow-down trend-icon"></i>'; }
                else { levelClass = "medium-price"; iconHtml = '<i class="fas fa-minus trend-icon"></i>'; }
                const convertedPrice = formatPrice(fruit.price, currentLang);
                let displayUnit = fruit.unit === "斤" ? unitMap.jin : (fruit.unit === "盒" ? unitMap.box : fruit.unit);
                const isGlobalBest = (globalMinMap.get(fruit.name) === fruit.price);
                const bestBadgeHtml = isGlobalBest ? `<span class="best-price-badge"><i class="fas fa-trophy"></i> 最低价</span>` : '';
                return `<div class="price-badge">
                            <div class="item-name">${fruit.name}</div>
                            <div class="price-value ${levelClass}">
                                ${currency}${convertedPrice}<span class="price-unit">/${displayUnit}</span>${iconHtml}
                                ${bestBadgeHtml}
                            </div>
                        </div>`;
            }).join('');
            
            const vegItemsHtml = shop.vegetables.map(veg => {
                const level = getPriceLevel(veg.price, allVegPrices);
                let levelClass = "", iconHtml = "";
                if(level === "high") { levelClass = "high-price"; iconHtml = '<i class="fas fa-arrow-up trend-icon"></i>'; }
                else if(level === "low") { levelClass = "low-price"; iconHtml = '<i class="fas fa-arrow-down trend-icon"></i>'; }
                else { levelClass = "medium-price"; iconHtml = '<i class="fas fa-minus trend-icon"></i>'; }
                const convertedPrice = formatPrice(veg.price, currentLang);
                let displayUnit = veg.unit === "斤" ? unitMap.jin : (veg.unit === "盒" ? unitMap.box : veg.unit);
                const isGlobalBest = (globalMinMap.get(veg.name) === veg.price);
                const bestBadgeHtml = isGlobalBest ? `<span class="best-price-badge"><i class="fas fa-trophy"></i> 最低价</span>` : '';
                return `<div class="price-badge">
                            <div class="item-name">${veg.name}</div>
                            <div class="price-value ${levelClass}">
                                ${currency}${convertedPrice}<span class="price-unit">/${displayUnit}</span>${iconHtml}
                                ${bestBadgeHtml}
                            </div>
                        </div>`;
            }).join('');
            
            const avgFruitRaw = getAvgFruitPrice(shop), avgVegRaw = getAvgVegPrice(shop);
            const avgFruitConverted = avgFruitRaw !== Infinity ? formatPrice(avgFruitRaw, currentLang) : null;
            const avgVegConverted = avgVegRaw !== Infinity ? formatPrice(avgVegRaw, currentLang) : null;
            const fruitAvgDesc = avgFruitRaw !== Infinity ? `${translations[currentLang].avg_fruit} ${currency}${avgFruitConverted}` : translations[currentLang].no_fruit_data;
            const vegAvgDesc = avgVegRaw !== Infinity ? `${translations[currentLang].avg_veg} ${currency}${avgVegConverted}` : translations[currentLang].no_veg_data;
            const fruitAvgSuffix = avgFruitRaw !== Infinity ? `(${translations[currentLang].avg_fruit} ${currency}${avgFruitConverted})` : '';
            const vegAvgSuffix = avgVegRaw !== Infinity ? `(${translations[currentLang].avg_veg} ${currency}${avgVegConverted})` : '';
            
            return `<div class="shop-card"><div class="card-header"><div class="shop-name"><i class="fas fa-store"></i> ${escapeHtml(shop.displayName)}</div><div class="distance"><i class="fas fa-location-dot"></i> ${shop.distance.toFixed(1)} ${translations[currentLang].distance_km}</div></div><div class="price-section"><div class="category-title"><i class="fas fa-apple-alt"></i> ${translations[currentLang].fruit_title} ${fruitAvgSuffix}</div><div class="price-items">${fruitItemsHtml.length ? fruitItemsHtml : `<div class="price-badge">${translations[currentLang].no_fruit}</div>`}</div><div class="category-title" style="margin-top:8px;"><i class="fas fa-carrot"></i> ${translations[currentLang].veg_title} ${vegAvgSuffix}</div><div class="price-items">${vegItemsHtml.length ? vegItemsHtml : `<div class="price-badge">${translations[currentLang].no_veg}</div>`}</div><div style="font-size:0.7rem; margin-top:8px; color:#909e82;"><i class="fas fa-chart-simple"></i> ${fruitAvgDesc} · ${vegAvgDesc}</div></div></div>`;
        }).join('');
        container.innerHTML = cardsHtml;
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

    function refreshDisplay() {
        let shopsWithDist = updateShopsWithDistanceAndLang();
        let typeFiltered = filterByType(shopsWithDist, currentTypeFilter);
        let productFiltered = filterShopsByProduct(typeFiltered, currentProductFilter);
        let finalSorted = getFinalSortedShops(productFiltered, currentSort, currentProductFilter);
        render(finalSorted);
        updateFilterUI();
    }

    function filterByType(shops, typeFilter) { if(typeFilter === "all") return shops; return shops.filter(shop => shop.type === typeFilter); }

    function updateFilterUI() {
        const infoDiv = document.getElementById('activeFilterInfo');
        if (currentProductFilter) {
            infoDiv.innerHTML = `<div class="active-filter-badge"><i class="fas fa-filter"></i> ${translations[currentLang].filter_active} <strong>${currentProductFilter}</strong> <button id="clearProductFilterBtn" class="clear-filter-btn"><i class="fas fa-times"></i> ${translations[currentLang].clear_filter}</button></div>`;
            const clearBtn = document.getElementById('clearProductFilterBtn');
            if (clearBtn) clearBtn.onclick = () => { currentProductFilter = ""; document.getElementById('productSearch').value = ""; refreshDisplay(); };
        } else {
            infoDiv.innerHTML = "";
        }
    }

    function initTags() {
        const products = getAllUniqueProducts();
        const container = document.getElementById('tagCloud');
        if (!container) return;
        container.innerHTML = products.map(p => `<button class="product-tag" data-product="${p}">${p}</button>`).join('');
        document.querySelectorAll('.product-tag').forEach(btn => {
            btn.addEventListener('click', () => {
                const product = btn.getAttribute('data-product');
                currentProductFilter = product;
                document.getElementById('productSearch').value = product;
                refreshDisplay();
            });
        });
    }

    function updateUILanguage() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
        });
        const sortSelect = document.getElementById('sortSelect');
        if (sortSelect) {
            for (let i = 0; i < sortSelect.options.length; i++) {
                const opt = sortSelect.options[i];
                const key = opt.getAttribute('data-i18n');
                if (key && translations[currentLang][key]) opt.text = translations[currentLang][key];
            }
        }
        document.querySelectorAll('.lang-btn').forEach(btn => { if (btn.getAttribute('data-lang') === currentLang) btn.classList.add('active'); else btn.classList.remove('active'); });
        refreshDisplay();
        initTags();
    }

    function getUserLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(pos => { currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; document.getElementById('userLocation').innerHTML = `📍 ${currentLocation.lat.toFixed(3)}, ${currentLocation.lng.toFixed(3)}`; refreshDisplay(); }, () => { document.getElementById('userLocation').innerHTML = translations[currentLang].location_not; refreshDisplay(); });
        } else { document.getElementById('userLocation').innerHTML = "不支持定位"; refreshDisplay(); }
    }

    const modal = document.getElementById('rewardModal');
    const rewardImage = document.getElementById('rewardImage');
    const rewardBtn = document.getElementById('rewardBtn');
    function showRewardModal() { rewardImage.src = "打赏100韩元.png"; modal.classList.add('active'); rewardImage.onerror = () => { rewardImage.alt = "图片加载失败"; }; }
    function closeRewardModal() { modal.classList.remove('active'); }
    rewardBtn.addEventListener('click', (e) => { e.stopPropagation(); showRewardModal(); });
    modal.addEventListener('click', () => { closeRewardModal(); });

    function init() {
        refreshDisplay();
        initTags();
        document.getElementById('locateBtn').addEventListener('click', getUserLocation);
        document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTypeFilter = btn.getAttribute('data-type'); refreshDisplay(); }); });
        document.getElementById('sortSelect').addEventListener('change', (e) => { currentSort = e.target.value; refreshDisplay(); });
        document.querySelectorAll('.lang-btn').forEach(btn => { btn.addEventListener('click', () => { currentLang = btn.getAttribute('data-lang'); updateUILanguage(); }); });
        const searchInput = document.getElementById('productSearch');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            currentProductFilter = val;
            refreshDisplay();
            if (clearSearchBtn) clearSearchBtn.style.display = val ? "inline-block" : "none";
        });
        if (clearSearchBtn) clearSearchBtn.addEventListener('click', () => { searchInput.value = ""; currentProductFilter = ""; refreshDisplay(); clearSearchBtn.style.display = "none"; });
        updateUILanguage();
    }
    init();
</script>
